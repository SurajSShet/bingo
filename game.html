<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo – Game Room</title>
    <meta name="description" content="Play multiplayer Bingo in real-time with your friends." />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-gray-950 min-h-screen overflow-x-hidden">

    <!-- Animated background orbs (subtle) -->
    <div class="orb orb-game-1"></div>
    <div class="orb orb-game-2"></div>

    <!-- Header -->
    <header class="game-header">
        <div class="flex items-center gap-3">
            <div class="logo-badge-sm">B</div>
            <div>
                <h1 class="text-white font-bold text-base leading-none">BINGO</h1>
                <div class="flex items-center gap-1 mt-0.5">
                    <span class="text-xs text-gray-400">Room:</span>
                    <span id="headerRoomId"
                        class="text-xs font-bold text-blue-400 tracking-widest uppercase cursor-pointer"
                        title="Click to copy" onclick="copyRoomId()">---</span>
                    <svg class="w-3 h-3 text-gray-500 ml-0.5 cursor-pointer" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" onclick="copyRoomId()">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div id="turnIndicator" class="turn-pill">Waiting...</div>
            <button onclick="leaveGame()" class="text-gray-500 hover:text-red-400 transition-colors p-1"
                title="Leave game">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main layout -->
    <main class="game-layout">

        <!-- LEFT: Player list + Called numbers -->
        <aside class="game-sidebar">

            <!-- Players panel -->
            <div class="panel">
                <div class="panel-header">
                    <svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span>Players</span>
                    <span id="playerCount" class="ml-auto text-xs text-gray-500">0/10</span>
                </div>
                <div id="playerList" class="panel-body space-y-1.5">
                    <!-- Populated by JS -->
                </div>
                <div id="startGameContainer" class="p-3 border-t border-white/5 hidden">
                    <button id="startGameBtn" class="btn-primary w-full text-sm py-2" onclick="startGame()">
                        Start Game
                    </button>
                    <p class="text-xs text-gray-600 text-center mt-1">Only host can start</p>
                </div>
            </div>

            <!-- Called numbers -->
            <div class="panel">
                <div class="panel-header">
                    <svg class="w-4 h-4 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span>Called Numbers</span>
                    <span id="calledCount" class="ml-auto text-xs text-gray-500">0/25</span>
                </div>
                <div id="calledNumbers" class="panel-body">
                    <div class="called-grid">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

        </aside>

        <!-- CENTER: Bingo board -->
        <section class="game-center">

            <!-- BINGO header letters -->
            <div class="bingo-header-letters">
                <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
            </div>

            <!-- Grid -->
            <div id="bingoGrid" class="bingo-grid">
                <!-- Populated by JS -->
            </div>

            <!-- Lines count -->
            <div class="mt-4 flex items-center gap-2 justify-center">
                <span class="text-xs text-gray-500">Your lines:</span>
                <div id="linesDisplay" class="flex gap-1">
                    <span class="line-dot"></span>
                    <span class="line-dot"></span>
                    <span class="line-dot"></span>
                    <span class="line-dot"></span>
                    <span class="line-dot"></span>
                </div>
                <span id="linesCount" class="text-sm font-bold text-blue-400">0 / 5</span>
            </div>

            <!-- Call number - only active on your turn -->
            <div id="callNumberPanel" class="mt-4 hidden">
                <div class="call-panel">
                    <p class="text-sm text-blue-300 font-medium mb-3">It's your turn! Click a number on your board, or:
                    </p>
                    <div class="flex gap-2">
                        <input id="manualCallInput" type="number" min="1" max="25" placeholder="1–25"
                            class="input-field flex-1 text-center" />
                        <button onclick="callNumber()" class="btn-primary px-6">Call</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- RIGHT: Chat -->
        <aside class="game-sidebar">
            <div class="panel flex flex-col" style="height: 100%">
                <div class="panel-header">
                    <svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <span>Chat</span>
                </div>
                <div id="chatMessages" class="panel-body flex-1 overflow-y-auto space-y-2 chat-scroll">
                    <div class="system-msg">Welcome to the room! 👋</div>
                </div>
                <div class="chat-input-area">
                    <input id="chatInput" type="text" maxlength="120" placeholder="Say something..."
                        class="input-field flex-1 text-sm py-2" autocomplete="off" />
                    <button onclick="sendChat()" class="btn-icon" id="sendChatBtn">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

    </main>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Winner Modal -->
    <div id="winnerModal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="confetti-container" id="confettiContainer"></div>
            <div class="winner-crown">👑</div>
            <h2 class="text-3xl font-black text-white mt-2" id="winnerName">Player</h2>
            <p class="text-blue-400 font-medium text-sm mt-1">WINS THE GAME!</p>
            <div class="winner-bingo-text">BINGO!</div>
            <div class="flex gap-3 mt-6">
                <button onclick="playAgain()" class="btn-primary flex-1">Play Again</button>
                <button onclick="window.location.href='index.html'" class="btn-secondary flex-1">Leave</button>
            </div>
        </div>
    </div>

    <!-- Firebase + Game JS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore,
            doc, updateDoc, onSnapshot, arrayUnion, serverTimestamp,
            collection, addDoc, query, orderBy, limit
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────────────
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // ─────────────────────────────────────────────────────────────────────────

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Session data
        const uid = sessionStorage.getItem('bingo_uid');
        const myName = sessionStorage.getItem('bingo_name');
        const roomId = sessionStorage.getItem('bingo_room');

        if (!uid || !myName || !roomId) {
            window.location.href = 'index.html';
        }

        // Update header
        document.getElementById('headerRoomId').textContent = roomId;

        // ─── BOARD GENERATION ──────────────────────────────────────────────────────
        let myBoard = [];
        const BOARD_KEY = `bingo_board_${roomId}_${uid}`;

        function generateBoard() {
            const stored = sessionStorage.getItem(BOARD_KEY);
            if (stored) return JSON.parse(stored);
            const nums = shuffle([...Array(25)].map((_, i) => i + 1));
            sessionStorage.setItem(BOARD_KEY, JSON.stringify(nums));
            return nums;
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        myBoard = generateBoard();
        renderBoard();

        // ─── BOARD RENDER ──────────────────────────────────────────────────────────
        function renderBoard() {
            const grid = document.getElementById('bingoGrid');
            grid.innerHTML = '';
            myBoard.forEach((num, idx) => {
                const cell = document.createElement('button');
                cell.id = `cell-${num}`;
                cell.className = 'bingo-cell';
                cell.textContent = num;
                cell.dataset.num = num;
                cell.onclick = () => onCellClick(num);
                grid.appendChild(cell);
            });
        }

        function highlightCalled(calledNumbers) {
            myBoard.forEach(num => {
                const cell = document.getElementById(`cell-${num}`);
                if (!cell) return;
                if (calledNumbers.includes(num)) {
                    cell.classList.add('called');
                } else {
                    cell.classList.remove('called');
                }
            });
            updateCalledPanel(calledNumbers);
            checkWinning(calledNumbers);
        }

        // ─── WIN DETECTION ─────────────────────────────────────────────────────────
        function checkWinning(calledNumbers) {
            const called = new Set(calledNumbers);
            const grid = myBoard; // flat 25 nums, 5x5
            let lines = 0;
            const winCells = new Set();

            // Rows
            for (let r = 0; r < 5; r++) {
                const row = grid.slice(r * 5, r * 5 + 5);
                if (row.every(n => called.has(n))) {
                    lines++;
                    row.forEach(n => winCells.add(n));
                }
            }
            // Columns
            for (let c = 0; c < 5; c++) {
                const col = [0, 1, 2, 3, 4].map(r => grid[r * 5 + c]);
                if (col.every(n => called.has(n))) {
                    lines++;
                    col.forEach(n => winCells.add(n));
                }
            }
            // Diagonal TL-BR
            const diag1 = [0, 6, 12, 18, 24].map(i => grid[i]);
            if (diag1.every(n => called.has(n))) { lines++; diag1.forEach(n => winCells.add(n)); }
            // Diagonal TR-BL
            const diag2 = [4, 8, 12, 16, 20].map(i => grid[i]);
            if (diag2.every(n => called.has(n))) { lines++; diag2.forEach(n => winCells.add(n)); }

            // Highlight winning cells
            myBoard.forEach(num => {
                const cell = document.getElementById(`cell-${num}`);
                if (cell) {
                    cell.classList.toggle('winning', winCells.has(num));
                }
            });

            // Update lines display
            updateLinesDisplay(lines);

            return lines;
        }

        function updateLinesDisplay(lines) {
            document.getElementById('linesCount').textContent = `${lines} / 5`;
            const dots = document.querySelectorAll('.line-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i < lines);
            });
        }

        // ─── GAME STATE LISTENER ───────────────────────────────────────────────────
        let gameState = null;

        onSnapshot(doc(db, 'rooms', roomId), (snap) => {
            if (!snap.exists()) return;
            gameState = snap.data();
            renderPlayerList(gameState.players);
            highlightCalled(gameState.calledNumbers || []);
            updateTurnUI(gameState);

            if (gameState.winner) {
                showWinner(gameState.winner, gameState.players);
            }
        });

        // ─── PLAYER LIST ───────────────────────────────────────────────────────────
        function renderPlayerList(players) {
            const list = document.getElementById('playerList');
            const count = document.getElementById('playerCount');
            count.textContent = `${players.length}/10`;

            list.innerHTML = '';
            const isHost = players[0]?.id === uid;

            players.forEach((p, idx) => {
                const isMe = p.id === uid;
                const isTurn = gameState && idx === gameState.currentTurn && gameState.gameStarted;
                const div = document.createElement('div');
                div.className = `player-row ${isMe ? 'me' : ''} ${isTurn ? 'active-turn' : ''}`;
                div.innerHTML = `
          <div class="player-avatar">${p.name[0].toUpperCase()}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1">
              <span class="text-sm font-medium text-white truncate">${p.name}</span>
              ${isMe ? '<span class="text-xs text-blue-400 font-medium">(You)</span>' : ''}
              ${idx === 0 ? '<span class="text-xs text-yellow-400">👑</span>' : ''}
            </div>
            <span class="text-xs text-gray-500">Lines: <span class="text-blue-400 font-medium">${p.score || 0}</span></span>
          </div>
          ${isTurn ? '<div class="turn-badge">Turn</div>' : ''}
        `;
                list.appendChild(div);
            });

            // Show start button only for host if game not started
            const startContainer = document.getElementById('startGameContainer');
            if (isHost && gameState && !gameState.gameStarted) {
                startContainer.classList.remove('hidden');
            } else {
                startContainer.classList.add('hidden');
            }
        }

        // ─── TURN UI ───────────────────────────────────────────────────────────────
        function updateTurnUI(state) {
            const indicator = document.getElementById('turnIndicator');
            const callPanel = document.getElementById('callNumberPanel');

            if (!state.gameStarted) {
                indicator.textContent = 'Waiting to start...';
                indicator.className = 'turn-pill waiting';
                callPanel.classList.add('hidden');
                return;
            }

            const currentPlayer = state.players[state.currentTurn];
            const isMyTurn = currentPlayer?.id === uid;

            if (isMyTurn) {
                indicator.textContent = 'Your Turn! 🎲';
                indicator.className = 'turn-pill my-turn';
                callPanel.classList.remove('hidden');
            } else {
                indicator.textContent = `${currentPlayer?.name}'s Turn`;
                indicator.className = 'turn-pill other-turn';
                callPanel.classList.add('hidden');
            }
        }

        // ─── GAME ACTIONS ──────────────────────────────────────────────────────────
        window.startGame = async function () {
            if (!gameState || gameState.gameStarted) return;
            if (gameState.players.length < 2) {
                showToast('Need at least 2 players to start!');
                return;
            }
            try {
                await updateDoc(doc(db, 'rooms', roomId), { gameStarted: true });
                addSystemChat('🎮 Game started! Good luck everyone!');
            } catch (e) { console.error(e); }
        };

        window.callNumber = function () {
            const input = document.getElementById('manualCallInput');
            const num = parseInt(input.value);
            if (!num || num < 1 || num > 25) { showToast('Enter a number between 1 and 25'); return; }
            doCallNumber(num);
            input.value = '';
        };

        window.onCellClick = function (num) {
            if (!gameState || !gameState.gameStarted) return;
            const currentPlayer = gameState.players[gameState.currentTurn];
            if (currentPlayer?.id !== uid) {
                showToast("It's not your turn yet! ⏳");
                return;
            }
            doCallNumber(num);
        };

        async function doCallNumber(num) {
            if (!gameState || !gameState.gameStarted) return;
            const currentPlayer = gameState.players[gameState.currentTurn];
            if (currentPlayer?.id !== uid) { showToast("It's not your turn!"); return; }

            if (gameState.calledNumbers.includes(num)) { showToast(`${num} already called!`); return; }

            // Calculate lines after calling
            const newCalled = [...gameState.calledNumbers, num];
            const lines = checkWinning(newCalled);

            const nextTurn = (gameState.currentTurn + 1) % gameState.players.length;
            const update = {
                calledNumbers: arrayUnion(num),
                currentTurn: nextTurn
            };

            // Check if this player won (5 lines)
            if (lines >= 5 && !gameState.winner) {
                update.winner = { id: uid, name: myName };

                // Update score
                const updatedPlayers = gameState.players.map(p => {
                    if (p.id === uid) return { ...p, score: (p.score || 0) + 1 };
                    return p;
                });
                update.players = updatedPlayers;
            }

            try {
                await updateDoc(doc(db, 'rooms', roomId), update);
                await addSystemChat(`📢 ${myName} called number ${num}!`);
            } catch (e) { console.error(e); showToast('Failed to call number'); }
        }

        window.playAgain = async function () {
            document.getElementById('winnerModal').classList.add('hidden');
            try {
                await updateDoc(doc(db, 'rooms', roomId), {
                    calledNumbers: [],
                    currentTurn: 0,
                    winner: null,
                    gameStarted: false
                });
                // Reset board
                sessionStorage.removeItem(BOARD_KEY);
                myBoard = generateBoard();
                renderBoard();
                addSystemChat('🔄 New game started!');
            } catch (e) { console.error(e); }
        };

        window.leaveGame = function () {
            if (confirm('Leave the game?')) {
                window.location.href = 'index.html';
            }
        };

        // ─── CALLED NUMBERS PANEL ─────────────────────────────────────────────────
        function updateCalledPanel(calledNumbers) {
            const panel = document.getElementById('calledNumbers');
            document.getElementById('calledCount').textContent = `${calledNumbers.length}/25`;

            if (calledNumbers.length === 0) {
                panel.innerHTML = '<p class="text-xs text-gray-600 p-2">No numbers called yet</p>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'called-grid';
            [...calledNumbers].sort((a, b) => a - b).forEach(n => {
                const span = document.createElement('span');
                span.className = 'called-num';
                span.textContent = n;
                grid.appendChild(span);
            });
            panel.innerHTML = '';
            panel.appendChild(grid);
        }

        // ─── WINNER DISPLAY ────────────────────────────────────────────────────────
        function showWinner(winner, players) {
            const modal = document.getElementById('winnerModal');
            if (modal.classList.contains('hidden')) {
                document.getElementById('winnerName').textContent = winner.name;
                modal.classList.remove('hidden');
                launchConfetti();
            }
        }

        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#2563eb', '#7c3aed', '#db2777', '#d97706', '#10b981', '#f97316'];
            for (let i = 0; i < 80; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.cssText = `
          left: ${Math.random() * 100}%;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-delay: ${Math.random() * 2}s;
          animation-duration: ${2 + Math.random() * 2}s;
          width: ${6 + Math.random() * 8}px;
          height: ${6 + Math.random() * 8}px;
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        `;
                container.appendChild(piece);
            }
        }

        // ─── CHAT ──────────────────────────────────────────────────────────────────
        const chatRef = collection(db, 'rooms', roomId, 'chat');

        // Listen for chat
        onSnapshot(query(chatRef, orderBy('createdAt', 'asc'), limit(100)), (snap) => {
            snap.docChanges().forEach(change => {
                if (change.type === 'added') {
                    const msg = change.doc.data();
                    appendChatMessage(msg);
                }
            });
        });

        function appendChatMessage(msg) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');

            if (msg.system) {
                div.className = 'system-msg';
                div.textContent = msg.text;
            } else {
                const isMe = msg.uid === uid;
                div.className = `chat-bubble ${isMe ? 'mine' : 'theirs'}`;
                div.innerHTML = `
          ${!isMe ? `<span class="chat-sender">${msg.name}</span>` : ''}
          <span class="chat-text">${escapeHtml(msg.text)}</span>
          <span class="chat-time">${formatTime(msg.createdAt)}</span>
        `;
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        window.sendChat = async function () {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            try {
                await addDoc(chatRef, {
                    uid,
                    name: myName,
                    text,
                    system: false,
                    createdAt: serverTimestamp()
                });
            } catch (e) { console.error(e); }
        };

        async function addSystemChat(text) {
            try {
                await addDoc(chatRef, { text, system: true, createdAt: serverTimestamp() });
            } catch (e) { console.error(e); }
        }

        document.getElementById('chatInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') window.sendChat();
        });

        // ─── UTILS ─────────────────────────────────────────────────────────────────
        window.copyRoomId = function () {
            navigator.clipboard.writeText(roomId).then(() => showToast('Room ID copied! 📋'));
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('hidden');
            t.classList.add('show');
            setTimeout(() => { t.classList.remove('show'); t.classList.add('hidden'); }, 3000);
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        await signInAnonymously(auth).catch(console.error);
    </script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</body>

</html>
